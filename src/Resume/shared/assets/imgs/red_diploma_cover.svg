<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1000" viewBox="0 0 700 1000">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b10f2e"/>
      <stop offset="100%" stop-color="#7a0019"/>
    </linearGradient>
    <filter id="leather" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0.2" />
      <feGaussianBlur stdDeviation="0.4"/>
      <feBlend mode="multiply" in2="SourceGraphic" />
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff6b7"/>
      <stop offset="40%" stop-color="#e2c77e"/>
      <stop offset="60%" stop-color="#d6b25e"/>
      <stop offset="100%" stop-color="#a47e2a"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff6b7"/>
      <stop offset="100%" stop-color="#a47e2a"/>
    </linearGradient>
    <g id="leaf">
      <ellipse cx="0" cy="0" rx="6" ry="12" fill="url(#gold)" />
      <ellipse cx="7" cy="-2" rx="5" ry="10" fill="url(#gold)" transform="rotate(25)" />
    </g>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="700" height="1000" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="700" height="1000" fill="#000" opacity="0.08" filter="url(#leather)"/>

  <!-- Inner border -->
  <rect x="30" y="30" width="640" height="940" rx="18" ry="18" fill="none" stroke="url(#goldStroke)" stroke-width="3"/>
  <rect x="44" y="44" width="612" height="912" rx="12" ry="12" fill="none" stroke="url(#goldStroke)" stroke-width="1.2" opacity="0.8"/>

  <!-- Emblem (laurel wreath + star) -->
  <g opacity="0.95">
    <use href="#leaf" transform="translate(350,330) rotate(60) translate(0,-190) rotate(30.0)" /><use href="#leaf" transform="translate(350,330) rotate(-60) translate(0,-190) rotate(-30.0)" /><use href="#leaf" transform="translate(350,330) rotate(48) translate(0,-190) rotate(24.0)" /><use href="#leaf" transform="translate(350,330) rotate(-48) translate(0,-190) rotate(-24.0)" /><use href="#leaf" transform="translate(350,330) rotate(36) translate(0,-190) rotate(18.0)" /><use href="#leaf" transform="translate(350,330) rotate(-36) translate(0,-190) rotate(-18.0)" /><use href="#leaf" transform="translate(350,330) rotate(24) translate(0,-190) rotate(12.0)" /><use href="#leaf" transform="translate(350,330) rotate(-24) translate(0,-190) rotate(-12.0)" /><use href="#leaf" transform="translate(350,330) rotate(12) translate(0,-190) rotate(6.0)" /><use href="#leaf" transform="translate(350,330) rotate(-12) translate(0,-190) rotate(-6.0)" /><use href="#leaf" transform="translate(350,330) rotate(0) translate(0,-190) rotate(0.0)" /><use href="#leaf" transform="translate(350,330) rotate(0) translate(0,-190) rotate(0.0)" /><use href="#leaf" transform="translate(350,330) rotate(-12) translate(0,-190) rotate(-6.0)" /><use href="#leaf" transform="translate(350,330) rotate(12) translate(0,-190) rotate(6.0)" /><use href="#leaf" transform="translate(350,330) rotate(-24) translate(0,-190) rotate(-12.0)" /><use href="#leaf" transform="translate(350,330) rotate(24) translate(0,-190) rotate(12.0)" /><use href="#leaf" transform="translate(350,330) rotate(-36) translate(0,-190) rotate(-18.0)" /><use href="#leaf" transform="translate(350,330) rotate(36) translate(0,-190) rotate(18.0)" /><use href="#leaf" transform="translate(350,330) rotate(-48) translate(0,-190) rotate(-24.0)" /><use href="#leaf" transform="translate(350,330) rotate(48) translate(0,-190) rotate(24.0)" /><use href="#leaf" transform="translate(350,330) rotate(-60) translate(0,-190) rotate(-30.0)" /><use href="#leaf" transform="translate(350,330) rotate(60) translate(0,-190) rotate(30.0)" />
    <path d="M 350.0,294.0 L 343.5,311.1 L 325.3,312.0 L 339.5,323.4 L 334.7,341.0 L 350.0,331.0 L 365.3,341.0 L 360.5,323.4 L 374.7,312.0 L 356.5,311.1 Z" fill="url(#gold)" stroke="url(#goldStroke)" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="50%" y="720" text-anchor="middle" font-family="Times New Roman, Georgia, serif" font-size="86" letter-spacing="4" fill="url(#gold)">
    ДИПЛОМ
  </text>
  <rect x="210" y="738" width="280" height="2" fill="url(#gold)" opacity="0.85"/>

  <!-- Subtle corner shine -->
  <radialGradient id="shine" cx="0" cy="0" r="1">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <circle cx="0" cy="0" r="260" fill="url(#shine)"/>
</svg>
